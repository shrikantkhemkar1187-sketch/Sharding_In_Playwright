name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:           # Line ~6-7: 2 spaces indent, colon required
    timeout-minutes: 60  # 4 spaces
    runs-on: ubuntu-latest  # 4 spaces
   strategy:
  fail-fast: false
  matrix:
    shard: [1/4, 2/4, 3/4, 4/4]  # Exactly 2 spaces per level
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: blob-report
        path: blob-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-allure
        path: allure-report/
        retention-days: 30

   - name: Run headless playwright test
      use: coactions/setup-xvfb@v1
      with:
        run: npm test -- --shard=${{ matrix.shard }} 
        continue-on-error: true 


    merge-report:
      if: (always())
      needs: [test]
      runs-on: ubuntu-latest
      steps:
      -uses: actions/download-artifact@v4
      with:
        name: playwright-report
  test:
    timeout-minutes: 60
     runs-on: ubuntu-latest
      
  steps:
    -uses: actions/checkout@v4
    -uses: actions/setup-node@v4
      with:
        node-version: lts/*
    -name: Install dependencies
      run: npm ci
    -name: Download blob reports from Github Actions artifacts
      uses: actions/download-artifact@v4
      with:
        name: blob-report
        path: blob-report

    -name: Merge into html report
      run: npx playwright merge-reports --reporter html ./blob-report

    -name: Upload HTML report 
      uses: actions/upload-artifact@v4
      with: 
        name: html-report--attempt-${{ github.run_attempt }} 
        path: playwright-report/
        retention-days: 30